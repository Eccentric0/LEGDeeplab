# LEGDeeplab - Performance Benchmark Suite
# Comprehensive benchmarking for different models and configurations

[DEFAULT]
model_name = LEGDeeplab
dataset = VOC2012
input_size = 512,512
batch_size = 1
device = cuda
warmup_iterations = 10
benchmark_iterations = 100

[LEGDeeplab-S]
model_name = LEGDeeplab
model_variant = small
params = {"in_channels": 3, "num_classes": 21, "backbone": "resnet18"}
flops = 18.2
params_count = 12.4

[LEGDeeplab-M]
model_name = LEGDeeplab
model_variant = medium
params = {"in_channels": 3, "num_classes": 21, "backbone": "resnet50"}
flops = 36.8
params_count = 24.7

[LEGDeeplab-L]
model_name = LEGDeeplab
model_variant = large
params = {"in_channels": 3, "num_classes": 21, "backbone": "resnet101"}
flops = 68.4
params_count = 45.2

[DeepLabv3+]
model_name = DeepLabv3+
params = {"in_channels": 3, "num_classes": 21, "backbone": "resnet50"}
flops = 42.1
params_count = 55.8

[PSPNet]
model_name = PSPNet
params = {"in_channels": 3, "num_classes": 21, "backbone": "resnet50"}
flops = 39.7
params_count = 68.5

[HRNet]
model_name = HRNet
params = {"in_channels": 3, "num_classes": 21, "arch": "w48"}
flops = 54.2
params_count = 65.1

[Segmenter]
model_name = Segmenter
params = {"in_channels": 3, "num_classes": 21, "encoder": "vit_base", "decoder": "mask_transformer"}
flops = 48.6
params_count = 89.3

[BenchmarkSettings]
precision = ["float32", "float16"]
devices = ["cuda", "cpu"]
batch_sizes = [1, 2, 4, 8]
input_sizes = ["256,256", "512,512", "768,768"]

[MetricWeights]
mIoU = 0.4
speed_fps = 0.3
memory_usage = 0.2
parameters = 0.1

[EvaluationMetrics]
primary = mIoU
secondary = ["mPA", "FWIoU", "precision", "recall", "f1_score"]
performance = ["fps", "latency_ms", "throughput", "memory_mb"]

[HardwareConfig]
gpu_models = ["RTX_2080Ti", "RTX_3080", "RTX_3090", "RTX_4090", "V100", "A100"]
cpu_models = ["Intel_Xeon", "AMD_EPYC", "Apple_M1", "Apple_M2"]
memory_requirements = {"minimum": "8GB", "recommended": "32GB", "optimal": "64GB"}

[DatasetConfig]
VOC2012 = {"size": "2.5GB", "images": 11530, "classes": 21, "resolution": "variable"}
Cityscapes = {"size": "6.5GB", "images": 5000, "classes": 19, "resolution": "1024x2048"}
ADE20K = {"size": "18GB", "images": 20210, "classes": 150, "resolution": "variable"}
COCO = {"size": "22GB", "images": 118287, "classes": 80, "resolution": "variable"}

[TrainingConfig]
default_epochs = 200
learning_rates = [1e-4, 5e-5, 1e-5]
optimizers = ["adamw", "sgd", "adam"]
schedulers = ["poly", "cosine", "step"]
batch_sizes = [4, 8, 16, 32]

[ExportFormats]
onnx = {"opset": 11, "dynamic_axes": True, "optimize": True}
tensorrt = {"precision": ["fp32", "fp16"], "max_batch_size": 1}
openvino = {"precision": ["FP32", "FP16"], "compress_to_int8": False}
coreml = {"compute_units": "all", "minimum_deployment_target": "ios13"}

[QualityThresholds]
mIoU_minimum = 75.0
mPA_minimum = 80.0
speed_minimum_fps = 10.0
memory_maximum_mb = 8192

[TestScenarios]
real_time_inference = {"batch_size": 1, "latency_threshold_ms": 100}
high_accuracy = {"batch_size": 1, "accuracy_threshold": 80.0}
high_throughput = {"batch_size": 8, "throughput_threshold": 50}
edge_deployment = {"device": "cpu", "memory_limit_mb": 2048}

[ValidationSettings]
cross_validation_folds = 5
stratified_sampling = True
data_augmentation = ["rotation", "flip", "scale", "crop"]
evaluation_frequency = 1  # epochs
early_stopping_patience = 20